[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "isd-python-framework"
version = "0.0.1"
description = "ISD Python Framework — The foundational base framework for ISD module development"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "周暘恩", email = "chouyangen0401@ntu.edu.tw" },
    { name = "Anthony Chou", email = "mi.anthony.chou@gmail.com" },
]
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[project.optional-dependencies]
# pip install isd-python-framework[dev]
dev = [
    "pytest>=7.0",
    "black>=24.0",
]

[project.scripts]
# isd-python-framework -V / --version
isd-python-framework = "hyper_framework.cli:main"
