[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "isd-python-framework"
version = "0.1.0"
description = "ISD Python Framework — The foundational base framework for ISD module development"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "周暘恩", email = "chouyangen0401@ntu.edu.tw" },
    { name = "Anthony Chou", email = "mi.anthony.chou@gmail.com" },
]
dependencies = [
    "colorama>=0.4.6",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[project.optional-dependencies]
# pip install isd-python-framework[dev]
dev = [
    "pytest>=7.0",
    "black>=24.0",
]
# pip install isd-python-framework[excel]
excel = [
    "openpyxl>=3.1",
    "pandas>=2.0",
]
# pip install isd-python-framework[yaml]
yaml = [
    "pyyaml>=6.0",
]
# pip install isd-python-framework[filetest]  (excel + yaml — CSV/JSON/TXT/XML/INI/TOML 內建不需額外套件)
filetest = [
    "openpyxl>=3.1",
    "pandas>=2.0",
    "pyyaml>=6.0",
]
# pip install isd-python-framework[all]
all = [
    "isd-python-framework[dev,filetest]",
]

[project.scripts]
# isd-python-framework -V / --version
isd-python-framework = "hyper_framework.cli:main"
